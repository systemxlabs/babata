[package]
name = "babata"
version = "0.1.0"
edition = "2024"
homepage = "https://github.com/systemxlabs/babata"
license = "MIT"
repository = "https://github.com/systemxlabs/babata"

[dependencies]
async-trait = "0.1"
clap = { version = "4.5", features = ["derive"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
serde_yaml = "0.9"
base64 = "0.22"
log = "0.4"
logforth = { version = "0.29.1", features = ["starter-log"] }
tokio = { version = "1", features = ["full"] }
chrono = { version = "0.4", features = ["serde"] }
reqwest = { version = "0.12", features = ["json", "stream"] }
teloxide = "0.13"
uuid = { version = "1.20", features = ["v4"] }
shellexpand = "3.1"
rusqlite = { version = "0.32", features = ["bundled"] }
croner = { version = "2.2", features = ["serde"] }
rust-embed = { version = "8", features = ["include-flate", "include-exclude", "interpolate-folder-path"] }

[target.'cfg(windows)'.dependencies]
windows-service = "0.8"
