[workspace]
members = [
    "agent",
    "channels/telegram",
    "channels/tui",
]
resolver = "3"

[workspace.package]
version = "0.1.0"
edition = "2024"
homepage = "https://github.com/systemxlabs/babata"
license = "MIT"
repository = "https://github.com/systemxlabs/babata"

[workspace.dependencies]
async-trait = "0.1"
mime = "0.3.17"
serde_json = "1"
log = "0.4"
tokio = { version = "1", features = ["full"] }
reqwest = { version = "0.12", features = ["json", "stream"] }