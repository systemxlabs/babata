[package]
name = "babata"
version = "0.1.0"
edition = "2024"
homepage = "https://github.com/systemxlabs/babata"
license = "MIT"
repository = "https://github.com/systemxlabs/babata"

[dependencies]
async-trait = "0.1"
clap = { version = "4.5", features = ["derive"] }
mime = "0.3.17"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
log = "0.4"
tokio = { version = "1", features = ["full"] }
reqwest = { version = "0.12", features = ["json", "stream"] }
uuid = { version = "1.20", features = ["v4"] }
shellexpand = "3.1"