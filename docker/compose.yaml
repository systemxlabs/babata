services:
  babata:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        HTTP_PROXY: ${HTTP_PROXY:-}
        HTTPS_PROXY: ${HTTPS_PROXY:-}
        NO_PROXY: ${NO_PROXY:-}
    image: babata:latest
    ports:
      - "18800:18800"
    environment:
      BABATA_SERVER_ADDR: 0.0.0.0:18800
      HTTP_PROXY: ${HTTP_PROXY:-}
      HTTPS_PROXY: ${HTTPS_PROXY:-}
      NO_PROXY: ${NO_PROXY:-}
    volumes:
      - type: bind
        source: ${HOME}/.babata
        target: /home/babata/.babata
